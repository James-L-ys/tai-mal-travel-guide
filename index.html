<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="泰马路书">
<meta name="theme-color" content="#2D6A4F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="app-icon-192.png">

<title>🌴 少女旅行团 · 泰马漫游记</title>
<style>
:root{
  --bg:#FFF8F0;--surface:#FFFFFF;--fg:#2C1810;--fg2:#5C4A3A;--muted:#8B7355;
  --accent:#E07A5F;--green:#2D6A4F;--green-l:#52B788;--ocean:#00B4D8;
  --sand:#F5E6D3;--border:#E8DDD0;--shadow:0 2px 12px rgba(44,24,16,.08);
  --r:16px;--rs:10px;--pill:9999px;
  --font:'PingFang SC',-apple-system,'Helvetica Neue',sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--fg);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100dvh}
a{color:var(--accent);text-decoration:none}

/* Header */
.hdr{position:sticky;top:0;z-index:100;background:rgba(255,248,240,.92);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);padding:calc(var(--safe-t) + 8px) 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.hdr-title{font-size:17px;font-weight:600;color:var(--fg)}
.hdr-title span{font-size:12px;font-weight:400;color:var(--muted);margin-left:6px}
.hdr-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--pill);padding:6px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font)}
.hdr-btn:active{opacity:.8}

/* Bottom Tabs */
.tabs{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(255,248,240,.95);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding:6px 0 calc(var(--safe-b) + 4px)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;cursor:pointer;-webkit-user-select:none;user-select:none;transition:color .2s}
.tab svg{width:22px;height:22px;fill:none;stroke:var(--muted);stroke-width:1.8;transition:stroke .2s}
.tab span{font-size:10px;color:var(--muted);transition:color .2s}
.tab.active svg{stroke:var(--accent)}
.tab.active span{color:var(--accent);font-weight:600}

/* Main */
main{padding:8px 16px calc(var(--safe-b) + 70px)}

/* City Panel */
.city{display:none}
.city.active{display:block}

/* Hero */
.hero{border-radius:var(--r);padding:32px 20px;color:#fff;position:relative;overflow:hidden;margin-bottom:16px;min-height:140px;display:flex;flex-direction:column;justify-content:flex-end}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
.hero-overlay{position:absolute;inset:0;z-index:1}
.hero-content{position:relative;z-index:2}
.hero h2{font-size:28px;font-weight:700;margin-bottom:4px;text-shadow:0 1px 4px rgba(0,0,0,.2)}
.hero .sub{font-size:14px;opacity:.9;margin-bottom:2px}
.hero .dates{font-size:12px;opacity:.75}

/* Section Headers */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 0 8px;cursor:pointer;-webkit-user-select:none;user-select:none}
.sec-hdr h3{font-size:17px;font-weight:600;color:var(--fg)}
.sec-hdr .chevron{width:20px;height:20px;transition:transform .3s;color:var(--muted)}
.sec-hdr.open .chevron{transform:rotate(180deg)}
.sec-body{overflow:hidden;transition:max-height .35s ease,opacity .3s;max-height:0;opacity:0}
.sec-body.open{max-height:5000px;opacity:1}

/* Day Card */
.day{background:var(--surface);border-radius:var(--r);margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden}
.day-hdr{padding:14px 16px;cursor:pointer;-webkit-user-select:none;user-select:none;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);transition:background .15s}
.day-hdr:active{background:var(--sand)}
.day-num{width:36px;height:36px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.day-info{flex:1;min-width:0}
.day-info .title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-info .subtitle{font-size:12px;color:var(--muted)}
.day-chevron{width:18px;height:18px;transition:transform .3s;color:var(--muted);flex-shrink:0}
.day.open .day-chevron{transform:rotate(180deg)}
.day-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.day.open .day-body{max-height:5000px}
.day-content{padding:12px 16px 16px}

/* Activity Card */
.act{position:relative;margin-bottom:10px}
.act-front{background:var(--sand);display:flex;align-items:flex-start;gap:10px;border-radius:var(--rs);padding:12px 14px;position:relative;overflow:hidden}
.act.checked .act-front{background:rgba(45,106,79,.06)}
.act-front .icon{font-size:20px;flex-shrink:0;margin-top:1px}
.act-front .info{flex:1;min-width:0}
.act-front .info .name{font-size:14px;font-weight:500;line-height:1.4}
.act-front .info .note{font-size:12px;color:var(--muted);margin-top:2px}
.act-front .info .time{font-size:11px;color:var(--accent);font-weight:500}
.ck-btn{flex-shrink:0;background:var(--green);color:#fff;border:none;border-radius:var(--pill);padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);align-self:center;white-space:nowrap;transition:all .2s;z-index:4;position:relative}
.ck-btn:active{transform:scale(.95)}
.ck-btn.ck-done{background:var(--muted);font-size:11px;padding:5px 10px}

/* Stamp Overlay */
.act-stamp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:3}
.stamp-seal{width:72px;height:72px;border:3px dashed #C8960C;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;transform:rotate(-15deg);background:rgba(200,150,12,.08);gap:1px}
.stamp-seal .stamp-check{font-size:22px;color:#B8860B;line-height:1}
.stamp-seal .stamp-text{font-size:9px;font-weight:700;color:#B8860B;letter-spacing:1px}
.stamp-seal .stamp-time{font-size:7px;color:#B8860B;opacity:.7}

/* Sparkles */
.sparkle-particle{position:absolute;border-radius:50%;pointer-events:none;z-index:10;animation:sparkleBurst 1s cubic-bezier(.2,.8,.3,1) forwards}
@keyframes sparkleBurst{0%{opacity:1;transform:translate(0,0) scale(1.5)}40%{opacity:1}100%{opacity:0;transform:var(--sparkle-dx) scale(0)}}
.sparkle-star{position:absolute;pointer-events:none;z-index:10;animation:sparkleStar 1.2s cubic-bezier(.2,.8,.3,1) forwards}
@keyframes sparkleStar{0%{opacity:1;transform:translate(0,0) scale(0) rotate(0)}30%{opacity:1;transform:var(--sparkle-dx) scale(1.4) rotate(180deg)}100%{opacity:0;transform:var(--sparkle-dx2) scale(0) rotate(360deg)}}
.sparkle-ring{position:absolute;top:50%;left:50%;border-radius:50%;pointer-events:none;z-index:9;animation:sparkleRing .8s ease-out forwards}
@keyframes sparkleRing{0%{width:0;height:0;opacity:1;transform:translate(-50%,-50%)}100%{width:160px;height:160px;opacity:0;transform:translate(-50%,-50%)}}
.stamp-flash{position:absolute;inset:0;background:rgba(255,255,255,.7);border-radius:var(--rs);animation:flashOut .4s ease-out forwards;z-index:5;pointer-events:none}
@keyframes flashOut{0%{opacity:1}100%{opacity:0}}

/* Hotel/Transport cards */
.info-card{background:var(--sand);border-radius:var(--rs);padding:10px 14px;margin-bottom:8px;font-size:13px}
.info-card .label{font-size:11px;color:var(--muted);margin-bottom:2px}
.info-card .val{font-size:13px;line-height:1.5}

/* Food/Shop cards */
.food-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.food-card{background:var(--surface);border-radius:var(--rs);padding:12px;box-shadow:var(--shadow)}
.food-card .fname{font-size:14px;font-weight:600;margin-bottom:2px}
.food-card .fdesc{font-size:12px;color:var(--muted);line-height:1.4}
.food-card .fshop{font-size:11px;color:var(--accent);margin-top:4px}

/* Shop list */
.shop-list{margin-top:8px}
.shop-item{padding:10px 14px;background:var(--surface);border-radius:var(--rs);margin-bottom:8px;box-shadow:var(--shadow)}
.shop-item .sname{font-size:14px;font-weight:600}
.shop-item .sdetail{font-size:12px;color:var(--muted);margin-top:2px}

/* Etiquette */
.etiq-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.etiq-card{background:var(--surface);border-radius:var(--rs);padding:12px;text-align:center;box-shadow:var(--shadow)}
.etiq-card .eicon{font-size:24px;margin-bottom:4px}
.etiq-card .etitle{font-size:13px;font-weight:600;margin-bottom:2px}
.etiq-card .edesc{font-size:11px;color:var(--muted);line-height:1.4}

/* Durian table */
.durian-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;background:var(--surface);border-radius:var(--rs);overflow:hidden}
.durian-table th{background:var(--green);color:#fff;padding:8px 6px;text-align:left;font-weight:500;font-size:11px}
.durian-table td{padding:6px;border-bottom:1px solid var(--border);vertical-align:top}
.durian-table tr:last-child td{border-bottom:none}

/* Prep Panel */
.prep-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .3s}
.prep-overlay.open{opacity:1;pointer-events:auto}
.prep-panel{position:fixed;top:0;right:0;bottom:0;width:min(92vw,400px);z-index:201;background:var(--bg);transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:calc(var(--safe-t) + 16px) 20px 40px}
.prep-overlay.open .prep-panel{transform:translateX(0)}
.prep-close{position:sticky;top:0;float:right;background:var(--sand);border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--fg)}
.prep-title{font-size:22px;font-weight:700;margin:8px 0 20px;clear:both}
.prep-sec{margin-bottom:24px}
.prep-sec h4{font-size:15px;font-weight:600;margin-bottom:10px;color:var(--green);display:flex;align-items:center;gap:6px}
.prep-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;font-size:14px}
.prep-check{width:20px;height:20px;border:2px solid var(--border);border-radius:5px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;transition:all .2s;margin-top:1px}
.prep-check.done{background:var(--green);border-color:var(--green);color:#fff}
.prep-note{font-size:12px;color:var(--muted);font-style:italic;margin-top:8px;padding:8px 12px;background:var(--sand);border-radius:var(--rs)}

/* Progress bar */
.progress-wrap{margin-bottom:16px}
.progress-label{font-size:13px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--green-l));border-radius:3px;transition:width .4s}

/* Day progress */
.day-prog{display:flex;align-items:center;gap:8px;padding:8px 16px 12px}
.day-prog .prog-text{font-size:12px;color:var(--muted)}
.day-prog .prog-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.day-prog .prog-fill{height:100%;background:var(--green-l);border-radius:2px;transition:width .4s}

/* History timeline */
.timeline{margin-top:12px;padding-left:20px;border-left:2px solid var(--green-l)}
.tl-year{position:relative;padding:8px 0 8px 12px;font-size:13px}
.tl-year::before{content:'';position:absolute;left:-26px;top:14px;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--surface)}

/* Tag */
.tag{display:inline-block;padding:2px 8px;border-radius:var(--pill);font-size:11px;font-weight:500}
.tag-green{background:rgba(45,106,79,.1);color:var(--green)}
.tag-accent{background:rgba(224,122,95,.1);color:var(--accent)}
.tag-ocean{background:rgba(0,180,216,.1);color:var(--ocean)}

/* Animations */
@keyframes stampIn{0%{transform:scale(2.5) rotate(-30deg);opacity:0}50%{transform:scale(.85) rotate(-10deg);opacity:1}75%{transform:scale(1.1) rotate(-18deg)}100%{transform:scale(1) rotate(-15deg)}}
.stamp-anim{animation:stampIn .6s cubic-bezier(.4,0,.2,1)}

/* Safari fixes */
@supports (-webkit-touch-callout:none){
  .day-body{transition:none}
  .sec-body{transition:none}
}

/* Utility */
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}
.text-center{text-align:center}.text-sm{font-size:12px;color:var(--muted)}.text-accent{color:var(--accent)}
.flex-between{display:flex;justify-content:space-between;align-items:center}
</style>
</head>

// ── Rendering ──
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
const LS_KEY='trip-checkin';

function getChecked(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'{}')}catch{return{}}}
function saveChecked(d){localStorage.setItem(LS_KEY,JSON.stringify(d))}
function ckId(c,di,ai){return `${c}-${di}-${ai}`}

function render(){
  // Tabs
  const tabsEl=$('#tabs');
  tabsEl.innerHTML=CITIES.map((c,i)=>`
    <div class="tab${i===0?' active':''}" data-city="${c.id}">
      <svg viewBox="0 0 24 24"><path d="${tabPath(c.id)}"/></svg>
      <span>${c.name}</span>
    </div>`).join('');
  tabsEl.querySelectorAll('.tab').forEach(t=>t.onclick=()=>switchCity(t.dataset.city));

  // City panels
  const app=$('#app');
  app.innerHTML=CITIES.map((c,i)=>`<section class="city${i===0?' active':''}" id="city-${c.id}">${renderCity(c)}</section>`).join('');

  // Prep panel
  renderPrep();

  // Bind events
  bindEvents();
}

    bk:'M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z',
    lp:'M2 21l10-17L22 21H2zm10-12v5m0 2h.01',
    lk:'M17 8C8 10 5.9 16.17 3.82 21.34l1.89.66c.96-2.3 2.29-4.34 4.29-5.5V20h4v-4h4v4h4V8h-4z',

function renderCity(c){

    </div>
  </div>`;

  if(c.history){
    h+=`<div class="sec-hdr" data-sec="hist-${c.id}"><h3>📖 城市历史</h3><svg class="chevron" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>`;

  if(c.etiq){
    h+=`<div class="sec-hdr mt-16" data-sec="etiq-${c.id}"><h3>🙏 ${c.id==='cm'?'泰国':'马来西亚'}礼仪</h3><svg class="chevron" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>`;
    h+=`<div class="sec-body" id="etiq-${c.id}"><div class="etiq-grid">${c.etiq.map(e=>`<div class="etiq-card"><div class="eicon">${e.i}</div><div class="etitle">${e.t}</div><div class="edesc">${e.d}</div></div>`).join('')}</div></div>`;
  }

  // Country shopping (only for first city in each country)
  if(c.countryShop){
    h+=`<div class="sec-hdr mt-16" data-sec="cshop-${c.id}"><h3>🎁 ${c.id==='cm'?'泰国':'马来西亚'}特产</h3><svg class="chevron" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>`;
    h+=`<div class="sec-body" id="cshop-${c.id}"><div class="food-grid">${c.countryShop.map(s=>`<div class="food-card"><div class="fname">${s.i} ${s.t}</div><div class="fdesc">${s.d}</div><div class="fshop">${s.l}</div></div>`).join('')}</div>${c.shopNote?`<p class="text-sm mt-8">${c.shopNote}</p>`:''}</div>`;
  }

  // Progress
  const checked=getChecked();
  const allItems=c.days.flatMap((_,di)=>(c.days[di].items||[]).map((_,ai)=>ckId(c.id,di,ai)));
  const doneCount=allItems.filter(id=>checked[id]).length;

  const pct=totalCount?Math.round(doneCount/totalCount*100):0;
  h+=`<div class="progress-wrap mt-16">
    <div class="progress-label"><span>打卡进度</span><span>${doneCount}/${totalCount}</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>

  if(c.shopping){
    h+=`<div class="sec-hdr mt-16" data-sec="shop-${c.id}"><h3>🛍️ 购物指南</h3><svg class="chevron" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>`;

  if(c.nightMarket){
    h+=`<div class="sec-hdr mt-16" data-sec="nm-${c.id}"><h3>🌙 夜市</h3><svg class="chevron" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>`;

function renderDay(c,day,di){
  const checked=getChecked();
  const items=day.items||[];
  const doneCount=items.filter((_,ai)=>checked[ckId(c.id,di,ai)]).length;
  const pct=items.length?Math.round(doneCount/items.length*100):0;

  let h=`<div class="day" data-city="${c.id}" data-day="${di}">`;
  h+=`<div class="day-hdr">
    <div class="day-num" style="background:${c.color}">${di+1}</div>
    <div class="day-info">
      <div class="title">${day.d} ${day.wd} · ${day.t}</div>
      <div class="subtitle">${day.s||''}</div>
    </div>
    <svg class="day-chevron" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2"/></svg>
  </div>`;

  h+=`<div class="day-body"><div class="day-content">`;

  // Day progress
  if(items.length){
    h+=`<div class="day-prog"><span class="prog-text">${doneCount}/${items.length} 打卡</span><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div>`;
  }

  // Activities (flip cards)
  items.forEach((item,ai)=>{
    const id=ckId(c.id,di,ai);
    const isDone=!!checked[id];
    h+=`<div class="act${isDone?' checked':''}" data-id="${id}">
      <div class="act-front">
        <span class="icon">${item.i}</span>
        <div class="info">
          <div class="name">${item.t}</div>
          ${item.n?`<div class="note">${item.n}</div>`:''}
        </div>
        ${item.ck?`<button class="ck-btn${isDone?' ck-done':''}" onclick="doCheckin('${id}')">${isDone?'撤销':'打卡'}</button>`:''}
        ${isDone?`<div class="act-stamp"><div class="stamp-seal"><div class="stamp-check">✓</div><div class="stamp-text">已打卡</div><div class="stamp-time">${checked[id]}</div></div></div>`:''}
      </div>
    </div>`;
  });

  // Hotel
  if(day.hotel){
    h+=`<div class="info-card mt-8"><div class="label">🏨 住宿</div><div class="val"><strong>${day.hotel.n}</strong>`;
    if(day.hotel.a) h+=`<br>${day.hotel.a}`;
    if(day.hotel.p) h+=`<br>📞 ${day.hotel.p}`;
    h+=`</div></div>`;
  }

  // Transport
  if(day.hotel && day.hotel.transport){
    h+=`<div class="info-card"><div class="label">🚕 交通</div><div class="val">${day.hotel.transport}</div></div>`;
  }

  // Note
  if(day.note){
    h+=`<div class="info-card"><div class="val text-center" style="white-space:pre-line;font-size:14px;color:var(--green)">${day.note}</div></div>`;
  }

  h+=`</div></div></div>`;
  return h;
}

// ── Interactions ──
function switchCity(id){
  $$('.tab').forEach(t=>t.classList.toggle('active',t.dataset.city===id));
  $$('.city').forEach(c=>c.classList.remove('active'));
  document.getElementById('city-'+id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function doCheckin(id){
  const checked=getChecked();
  const el=document.querySelector(`.act[data-id="${id}"]`);
  if(checked[id]){
    delete checked[id];
    el.classList.remove('checked');
    const btn=el.querySelector('.ck-btn');
    if(btn){btn.textContent='打卡';btn.classList.remove('ck-done')}
    const front=el.querySelector('.act-front');
    const stamp=front.querySelector('.act-stamp');
    if(stamp)stamp.remove();
  }else{
    const now=new Date();
    const ts=`${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    checked[id]=ts;
    el.classList.add('checked');
    const btn=el.querySelector('.ck-btn');
    if(btn){btn.textContent='撤销';btn.classList.add('ck-done')}
    const front=el.querySelector('.act-front');
    front.insertAdjacentHTML('beforeend',`<div class="act-stamp"><div class="stamp-seal stamp-anim"><div class="stamp-check">✓</div><div class="stamp-text">已打卡</div><div class="stamp-time">${ts}</div></div></div>`);
    spawnSparkles(front);
  }
  saveChecked(checked);
  updateProgress();
}

function spawnSparkles(front){
  const rect=front.getBoundingClientRect();
  const cx=rect.width/2, cy=rect.height/2;
  const colors=['#FFD700','#FF6B6B','#48CAE4','#FFFFFF','#FF9F1C','#52B788','#E07A5F','#7B2FF7'];
  for(let i=0;i<20;i++){
    const p=document.createElement('div');
    p.className='sparkle-particle';
    const angle=(Math.PI*2/20)*i+Math.random()*0.3;
    const dist=35+Math.random()*70;
    const dx=Math.cos(angle)*dist, dy=Math.sin(angle)*dist;
    const size=6+Math.random()*10;
    p.style.cssText=`left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};--sparkle-dx:translate(${dx}px,${dy}px);width:${size}px;height:${size}px;animation-delay:${Math.random()*0.15}s`;
    front.appendChild(p);
    setTimeout(()=>p.remove(),1300);
  }
  const stars=['✦','✧','★','✶','✸'];
  for(let i=0;i<8;i++){
    const s=document.createElement('div');
    s.className='sparkle-star';
    const angle=Math.random()*Math.PI*2;
    const dist=30+Math.random()*50;
    const dx=Math.cos(angle)*dist, dy=Math.sin(angle)*dist;
    const dx2=Math.cos(angle)*dist*1.5, dy2=Math.sin(angle)*dist*1.5;
    s.style.cssText=`left:${cx}px;top:${cy}px;color:${colors[i%colors.length]};--sparkle-dx:translate(${dx}px,${dy}px);--sparkle-dx2:translate(${dx2}px,${dy2}px);animation-delay:${Math.random()*0.2}s;font-size:${14+Math.random()*8}px`;
    s.textContent=stars[i%stars.length];
    front.appendChild(s);
    setTimeout(()=>s.remove(),1500);
  }
  const ring=document.createElement('div');
  ring.className='sparkle-ring';
  ring.style.cssText='border:3px solid rgba(200,150,12,.3)';
  front.appendChild(ring);
  setTimeout(()=>ring.remove(),900);
  const ring2=document.createElement('div');
  ring2.className='sparkle-ring';
  ring2.style.cssText='border:2px solid rgba(255,215,0,.4);animation-delay:.15s';
  front.appendChild(ring2);
  setTimeout(()=>ring2.remove(),1050);
  const flash=document.createElement('div');
  flash.className='stamp-flash';
  front.appendChild(flash);
  setTimeout(()=>flash.remove(),500);
}

function updateProgress(){
  const checked=getChecked();
  CITIES.forEach(c=>{
    const cityEl=$(`#city-${c.id}`);
    if(!cityEl)return;
    const allItems=c.days.flatMap((_,di)=>(c.days[di].items||[]).map((_,ai)=>ckId(c.id,di,ai)));
    const done=allItems.filter(id=>checked[id]).length;
    const total=allItems.length;
    const pct=total?Math.round(done/total*100):0;
    const progEl=cityEl.querySelector('.progress-fill');
    if(progEl)progEl.style.width=pct+'%';
    const labelEl=cityEl.querySelector('.progress-label span:last-child');
    if(labelEl)labelEl.textContent=`${done}/${total}`;

    // Update day progress
    c.days.forEach((_,di)=>{
      const dayEl=cityEl.querySelector(`.day[data-day="${di}"]`);
      if(!dayEl)return;
      const items=c.days[di].items||[];
      const dDone=items.filter((_,ai)=>checked[ckId(c.id,di,ai)]).length;
      const dPct=items.length?Math.round(dDone/items.length*100):0;
      const dFill=dayEl.querySelector('.prog-fill');
      if(dFill)dFill.style.width=dPct+'%';
      const dText=dayEl.querySelector('.prog-text');
      if(dText)dText.textContent=`${dDone}/${items.length} 打卡`;
    });
  });
}

function togglePrep(){
  const ov=$('#prepOv');
  ov.classList.toggle('open');
  if(ov.classList.contains('open'))restorePrepState();
}

const PREP_KEY='trip-prep';
function togglePrepItem(el,id){
  el.classList.toggle('done');
  const items=getPrepState();
  items[id]=el.classList.contains('done');
  localStorage.setItem(PREP_KEY,JSON.stringify(items));
}
function getPrepState(){try{return JSON.parse(localStorage.getItem(PREP_KEY)||'{}')}catch{return{}}}
function restorePrepState(){
  const state=getPrepState();
  $$('.prep-check').forEach(el=>{
    const id=el.dataset.pid;
    if(state[id])el.classList.add('done');
  });
}

function bindEvents(){
  // Collapsible section headers
  document.addEventListener('click',e=>{
    const hdr=e.target.closest('.sec-hdr');
    if(hdr){
      const secId=hdr.dataset.sec;
      if(!secId)return;
      const body=document.getElementById(secId);
      if(body){
        hdr.classList.toggle('open');
        body.classList.toggle('open');
      }
    }

    // Day collapse
    const dayHdr=e.target.closest('.day-hdr');
    if(dayHdr){
      const day=dayHdr.closest('.day');
      day.classList.toggle('open');
    }
  });
}

// ── Service Worker registration ──
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(reg=>{
    console.log('SW registered',reg.scope);
    // Check for updates on load
    reg.update();
  }).catch(err=>console.warn('SW failed',err));
}

// ── Init ──
document.addEventListener('DOMContentLoaded',()=>{
  render();
  // Auto-open first day of each city
  setTimeout(()=>{
    $$('.city').forEach(cityEl=>{
      const firstDay=cityEl.querySelector('.day');
      if(firstDay)firstDay.classList.add('open');
    });
  },100);
});
</script>
